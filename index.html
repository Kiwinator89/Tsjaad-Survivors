<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSJAAD SURVIVORS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap');
  :root{
    --sand:#D4A854;--deep:#8B6914;--rust:#C4522A;--sky:#E8C87A;
    --dark:#0A0804;--ui:rgba(10,6,2,0.95);--xp:#FFD700;
    --green:#4CAF50;--blue:#2196F3;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#060402;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Oswald',sans-serif;overflow:hidden;}
  #gw{position:relative;width:900px;height:650px;}
  #gc{display:block;border:3px solid var(--deep);box-shadow:0 0 60px rgba(212,168,84,.3),0 0 120px rgba(0,0,0,.9);}

  #hud{position:absolute;top:0;left:0;right:0;pointer-events:none;padding:8px 12px;display:flex;justify-content:space-between;align-items:flex-start;z-index:10;}
  .hp{background:var(--ui);border:1px solid var(--deep);border-radius:3px;padding:6px 11px;min-width:160px;}
  .hl{font-family:'Share Tech Mono',monospace;color:var(--sand);font-size:9px;letter-spacing:2px;opacity:.6;}
  .hv{font-family:'Oswald',sans-serif;color:#fff;font-size:20px;letter-spacing:1px;line-height:1.1;font-weight:700;}
  #hpBar{width:100%;height:7px;background:#2a0808;border-radius:2px;overflow:hidden;margin-top:2px;}
  #hpFill{height:100%;background:linear-gradient(90deg,#8B1A1A,#e53935);border-radius:2px;transition:width .08s;}
  #xpBar{width:100%;height:5px;background:#1e1400;border-radius:2px;overflow:hidden;margin-top:4px;}
  #xpFill{height:100%;background:linear-gradient(90deg,#b8860b,#FFD700);border-radius:2px;transition:width .12s;}
  #dashBar{width:100%;height:4px;background:#0a0f18;border-radius:2px;overflow:hidden;margin-top:4px;}
  #dashFill{height:100%;background:linear-gradient(90deg,#1565c0,#64b5f6);border-radius:2px;transition:width .08s;}
  #timerP{text-align:center;background:var(--ui);border:1px solid var(--deep);border-radius:3px;padding:6px 18px;}
  #timerV{font-family:'Share Tech Mono',monospace;color:var(--sky);font-size:32px;letter-spacing:3px;}
  #waveAnn{font-family:'Oswald',sans-serif;color:var(--rust);font-size:11px;letter-spacing:2px;margin-top:2px;font-weight:600;}
  #killP{text-align:right;background:var(--ui);border:1px solid var(--deep);border-radius:3px;padding:6px 11px;min-width:130px;}

  #luO{position:absolute;inset:0;background:rgba(5,3,1,.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
  #luO.on{display:flex;}
  #luT{font-family:'Oswald',sans-serif;color:var(--xp);font-size:52px;letter-spacing:6px;font-weight:700;text-shadow:0 0 30px rgba(255,215,0,.5);animation:pls .5s ease-in-out infinite alternate;}
  #luS{color:var(--sand);font-size:13px;letter-spacing:3px;margin:5px 0 24px;opacity:.8;}
  @keyframes pls{from{transform:scale(1);}to{transform:scale(1.04);}}
  #ucards{display:flex;gap:14px;}
  .uc{width:220px;background:linear-gradient(155deg,#1a1106,#0d0802);border:2px solid var(--deep);border-radius:6px;padding:18px 14px;cursor:pointer;transition:all .16s;text-align:center;position:relative;overflow:hidden;}
  .uc:hover{border-color:var(--xp);transform:translateY(-4px);box-shadow:0 8px 24px rgba(255,215,0,.2);}
  .uc-ult:hover{border-color:#ff6600!important;box-shadow:0 8px 28px rgba(255,100,0,.4)!important;}
  .un{font-family:'Oswald',sans-serif;color:var(--xp);font-size:17px;letter-spacing:2px;margin-bottom:5px;font-weight:700;}
  .ud{color:#c8a870;font-size:10.5px;line-height:1.5;font-family:'Share Tech Mono',monospace;text-align:left;white-space:pre-wrap;word-break:break-word;}
  .ulv{display:block;font-family:'Share Tech Mono',monospace;color:var(--sand);font-size:10px;opacity:.5;margin-bottom:2px;}

  #startS,#goS{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;background:rgba(5,3,1,.97);}
  #goS{display:none;}
  .stitle{font-family:'Oswald',sans-serif;color:var(--xp);font-size:64px;letter-spacing:8px;font-weight:700;text-shadow:0 0 50px rgba(255,215,0,.4);text-align:center;line-height:.95;}
  .ssub{color:var(--sand);font-size:14px;letter-spacing:3px;margin:12px 0 30px;opacity:.75;text-align:center;font-family:'Share Tech Mono',monospace;}
  .sstats{color:#c8a96a;font-size:13px;letter-spacing:1px;margin-bottom:24px;text-align:center;line-height:2.2;font-family:'Share Tech Mono',monospace;}
  .btn{font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:4px;color:var(--dark);background:linear-gradient(135deg,var(--sand),var(--xp));border:none;padding:12px 44px;border-radius:3px;cursor:pointer;transition:all .16s;box-shadow:0 4px 20px rgba(212,168,84,.4);font-weight:700;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(212,168,84,.6);}

  #auP{position:absolute;bottom:10px;left:10px;display:flex;flex-wrap:wrap;gap:4px;z-index:10;pointer-events:none;max-width:660px;}
  .auc{background:var(--ui);border:1px solid var(--deep);border-radius:2px;padding:2px 7px;font-size:10px;color:var(--sand);font-family:'Share Tech Mono',monospace;}

  #mm{position:absolute;bottom:10px;right:10px;z-index:10;opacity:.75;border:1px solid var(--deep);}

  #wPop{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:15;opacity:0;transition:opacity .3s;text-align:center;}
  #wPop.show{opacity:1;}
  #wPopT{font-family:'Oswald',sans-serif;color:#ff6b35;font-size:48px;letter-spacing:6px;font-weight:700;text-shadow:0 0 28px rgba(255,107,53,.5);}
  #wPopS{color:var(--sand);font-size:12px;letter-spacing:3px;opacity:.85;font-family:'Share Tech Mono',monospace;}

  #chestMsg{position:absolute;top:22%;left:50%;transform:translateX(-50%);pointer-events:none;z-index:15;opacity:0;transition:opacity .25s;font-family:'Oswald',sans-serif;color:#FFD700;font-size:22px;letter-spacing:3px;font-weight:700;text-shadow:0 0 18px rgba(255,215,0,.6);}
  #chestMsg.show{opacity:1;}

  /* Bomb timer indicator */
  #bombTimer{position:absolute;top:52px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:10;background:var(--ui);border:1px solid var(--deep);border-radius:3px;padding:3px 12px;display:none;}
  #bombTimer.active{display:block;}
  #bombTimerBar{width:120px;height:5px;background:#1a0a00;border-radius:2px;overflow:hidden;margin-top:2px;}
  #bombTimerFill{height:100%;background:linear-gradient(90deg,#ff4400,#ffaa00);border-radius:2px;transition:width .1s;}
  #bombTimerLabel{font-family:'Share Tech Mono',monospace;color:#ff9944;font-size:9px;letter-spacing:2px;text-align:center;}
</style>
</head>
<body>
<div id="gw">
  <canvas id="gc" width="900" height="650"></canvas>
  <div id="hud">
    <div class="hp">
      <div class="hl">OVERLEVER</div>
      <div class="hv" id="lvlV">LV 1</div>
      <div class="hl" style="margin-top:2px">GEZONDHEID</div>
      <div id="hpBar"><div id="hpFill" style="width:100%"></div></div>
      <div class="hl" style="margin-top:4px">ERVARING</div>
      <div id="xpBar"><div id="xpFill" style="width:0%"></div></div>
      <div class="hl" style="margin-top:4px">DASH <span style="opacity:.4;font-size:8px">SPATIE</span></div>
      <div id="dashBar"><div id="dashFill" style="width:100%"></div></div>
    </div>
    <div id="timerP">
      <div class="hl">OVERLEEFD</div>
      <div id="timerV">00:00</div>
      <div id="waveAnn">WAVE 1</div>
    </div>
    <div id="killP">
      <div class="hl">GEDOOD</div>
      <div class="hv" id="killV">0</div>
      <div class="hl" style="margin-top:3px">SCORE</div>
      <div class="hv" id="scoreV" style="font-size:14px;color:var(--xp)">0</div>
    </div>
  </div>

  <div id="bombTimer">
    <div id="bombTimerLabel">BOM ▶ 30s</div>
    <div id="bombTimerBar"><div id="bombTimerFill" style="width:100%"></div></div>
  </div>

  <div id="auP"></div>
  <canvas id="mm" width="130" height="100"></canvas>

  <div id="wPop"><div id="wPopT">WAVE 1</div><div id="wPopS">DE HORDE NADERT</div></div>
  <div id="chestMsg">KIST GEOPEND!</div>

  <div id="luO">
    <div id="luT">LEVEL UP!</div>
    <div id="luS">KIES JE KRACHT</div>
    <div id="ucards"></div>
  </div>

  <div id="startS">
    <div class="stitle">TSJAAD<br>SURVIVORS</div>
    <div class="ssub">Overleefd de hitte van Tsjaad<br>WASD bewegen &middot; SPATIE dashen</div>
    <button class="btn" onclick="startGame()">BEGIN HET GEVECHT</button>
  </div>

  <div id="goS">
    <div class="stitle" style="color:#e53935">GEVALLEN</div>
    <div class="ssub">De woestijn eist haar tol</div>
    <div class="sstats" id="finalStats"></div>
    <button class="btn" onclick="startGame()">OPNIEUW PROBEREN</button>
  </div>
</div>

<script>
// ── Canvas setup ───────────────────────────────────────────────────────────────
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
const mmC=document.getElementById('mm'),mctx=mmC.getContext('2d');
const W=900,H=650,WW=3800,WH=3200;

// ── Max enemies cap to reduce lag ─────────────────────────────────────────────
const MAX_ENEMIES = 80;

// ── Audio ──────────────────────────────────────────────────────────────────────
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function beep(f=440,d=.06,t='square',v=.07,det=0){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;o.detune.value=det;
  g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d);}catch(e){}
}
const sfxHit=()=>beep(160,.05,'sawtooth',.05);
const sfxKill=()=>{beep(280,.1,'square',.08);setTimeout(()=>beep(380,.07,'square',.06),80);};
const sfxLvl=()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.12,'sine',.08),i*65));
const sfxDash=()=>beep(640,.08,'sine',.07,-220);
const sfxBoss=()=>{beep(100,.4,'sawtooth',.12);setTimeout(()=>beep(80,.5,'sawtooth',.1),200);};
const sfxExplo=()=>beep(70,.22,'sawtooth',.1,-600);
const sfxChest=()=>[440,550,660,880].forEach((f,i)=>setTimeout(()=>beep(f,.1,'sine',.1),i*50));

// ── Sprite drawing ─────────────────────────────────────────────────────────────
function drawSprite(ctx,name,x,y,size,opts={}){
  const s=size/2;
  ctx.save();
  ctx.translate(x,y);
  if(opts.scaleX)ctx.scale(opts.scaleX,1);
  switch(name){
    case 'player':{
      ctx.fillStyle=opts.hit?'#ff8888':'#d4a060';
      ctx.fillRect(-s*.4,-s*.55,s*.8,s*.9);
      ctx.fillStyle=opts.hit?'#ffaaaa':'#c88a50';
      ctx.beginPath();ctx.arc(0,-s*.55,s*.32,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(s*.1,-s*.6,s*.07,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#7a5020';
      ctx.fillRect(-s*.35,s*.35,s*.28,s*.38);
      ctx.fillRect(s*.07,s*.35,s*.28,s*.38);
      if(opts.dashing){
        ctx.globalAlpha=.4;ctx.fillStyle='#64b5f6';
        ctx.fillRect(-s*.4,-s*.55,s*.8,s*.9);ctx.globalAlpha=1;
      }
      break;
    }
    case 'giraffe':{
      ctx.fillStyle='#d4a030';
      ctx.fillRect(-s*.12,-s*.9,s*.24,s*.7);
      ctx.fillStyle='#e0b040';
      ctx.fillRect(-s*.18,-s*.95,s*.36,s*.22);
      ctx.fillStyle='#c89028';
      ctx.fillRect(-s*.45,-s*.25,s*.9,s*.6);
      ctx.fillStyle='#a07020';
      for(let i=-1;i<=1;i+=2){ctx.fillRect(i*s*.3,s*.35,s*.14,s*.48);}
      ctx.fillRect(-s*.15,s*.35,s*.14,s*.48);
      ctx.fillStyle='rgba(80,40,0,.35)';
      ctx.beginPath();ctx.arc(-s*.2,-s*.05,s*.12,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(s*.2,s*.08,s*.1,0,Math.PI*2);ctx.fill();
      break;
    }
    case 'lion':{
      ctx.fillStyle='#a06010';
      ctx.beginPath();ctx.arc(0,-s*.15,s*.52,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#d4a040';
      ctx.fillRect(-s*.42,-s*.2,s*.84,s*.52);
      ctx.fillStyle='#e0b050';
      ctx.beginPath();ctx.arc(0,-s*.15,s*.36,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffdd00';
      ctx.beginPath();ctx.arc(-s*.12,-s*.18,s*.08,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(s*.12,-s*.18,s*.08,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(-s*.12,-s*.18,s*.04,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(s*.12,-s*.18,s*.04,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#b8882c';
      for(let i=-1;i<=1;i+=2){ctx.fillRect(i*s*.28,s*.32,s*.16,s*.4);}
      ctx.fillRect(-s*.1,s*.32,s*.16,s*.4);
      break;
    }
    case 'cheetah':{
      ctx.fillStyle='#c8a830';
      ctx.beginPath();ctx.ellipse(0,0,s*.55,s*.28,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.4)';
      [[-s*.3,-s*.1],[s*.2,-s*.08],[0,s*.05],[s*.35,s*.1],[-s*.15,s*.08]].forEach(([bx,by])=>{ctx.beginPath();ctx.arc(bx,by,s*.07,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='#d4b040';
      ctx.beginPath();ctx.arc(-s*.5,0,s*.2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(-s*.52,s*.05);ctx.lineTo(-s*.56,s*.14);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-s*.44,s*.04);ctx.lineTo(-s*.46,s*.13);ctx.stroke();
      ctx.fillStyle='#a88828';
      for(let i=0;i<4;i++){ctx.fillRect(-s*.38+i*s*.22,s*.2,s*.1,s*.3);}
      break;
    }
    case 'croc':{
      ctx.fillStyle='#4a7a30';
      ctx.fillRect(-s*.7,-s*.22,s*1.4,s*.44);
      ctx.fillStyle='rgba(0,0,0,.2)';
      for(let i=0;i<6;i++){ctx.fillRect(-s*.65+i*s*.22,-s*.22,s*.12,s*.1);}
      ctx.fillStyle='#5a8a38';
      ctx.fillRect(s*.5,-s*.18,s*.32,s*.28);
      ctx.fillStyle='#eeeecc';
      for(let i=0;i<3;i++){ctx.fillRect(s*.52+i*s*.08,-s*.18,s*.04,s*.08);}
      ctx.fillStyle='#ffdd00';
      ctx.beginPath();ctx.arc(-s*.4,-s*.15,s*.09,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-s*.4,-s*.15,s*.05,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#3a6a28';
      ctx.fillRect(-s*.5,s*.22,s*.2,s*.18);ctx.fillRect(-s*.15,s*.22,s*.2,s*.18);
      ctx.fillRect(s*.2,s*.22,s*.2,s*.18);ctx.fillRect(s*.45,s*.22,s*.2,s*.18);
      break;
    }
    case 'elephant':{
      ctx.fillStyle='#888888';
      ctx.beginPath();ctx.ellipse(0,0,s*.62,s*.5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#929292';
      ctx.beginPath();ctx.arc(-s*.4,0,s*.35,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#888';
      ctx.fillRect(-s*.72,-s*.05,s*.08,s*.32);
      ctx.fillRect(-s*.72,s*.27,s*.2,s*.08);
      ctx.fillStyle='#a09090';
      ctx.beginPath();ctx.ellipse(-s*.6,-s*.1,s*.22,s*.28,.3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#eeeecc';
      ctx.fillRect(-s*.65,-s*.12,s*.14,s*.07);
      ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-s*.5,-s*.12,s*.06,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#777';
      for(let i=0;i<4;i++){ctx.fillRect(-s*.45+i*s*.25,s*.38,s*.18,s*.36);}
      break;
    }
    case 'rhino':{
      ctx.fillStyle='#707070';
      ctx.fillRect(-s*.55,-s*.35,s*1.1,s*.7);
      ctx.fillStyle='#787878';
      ctx.fillRect(s*.4,-s*.28,s*.42,s*.45);
      ctx.fillStyle='#b0a080';
      ctx.beginPath();ctx.moveTo(s*.75,-s*.28);ctx.lineTo(s*.95,-s*.55);ctx.lineTo(s*.85,-s*.24);ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(-s*.1,-s*.35);ctx.lineTo(-s*.1,s*.35);ctx.stroke();
      ctx.beginPath();ctx.moveTo(s*.2,-s*.35);ctx.lineTo(s*.2,s*.35);ctx.stroke();
      ctx.fillStyle='#222';ctx.beginPath();ctx.arc(s*.5,-s*.1,s*.07,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#606060';
      for(let i=0;i<4;i++){ctx.fillRect(-s*.48+i*s*.28,s*.35,s*.2,s*.32);}
      break;
    }
    case 'hippo':{
      ctx.fillStyle='#8a7a8a';
      ctx.beginPath();ctx.ellipse(0,s*.1,s*.7,s*.52,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#998898';
      ctx.beginPath();ctx.ellipse(-s*.3,0,s*.42,s*.32,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(-s*.62,s*.06);ctx.lineTo(0,s*.06);ctx.stroke();
      ctx.fillStyle='rgba(0,0,0,.3)';
      ctx.beginPath();ctx.ellipse(-s*.38,-s*.08,s*.07,s*.05,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(-s*.22,-s*.08,s*.07,s*.05,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#cc4400';
      ctx.beginPath();ctx.arc(-s*.38,-s*.2,s*.09,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(-s*.18,-s*.2,s*.09,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(-s*.38,-s*.2,s*.05,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(-s*.18,-s*.2,s*.05,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#7a6a7a';
      for(let i=0;i<4;i++){ctx.fillRect(-s*.52+i*s*.3,s*.46,s*.22,s*.28);}
      break;
    }
    case 'vulture':{
      ctx.fillStyle='#2a2a2a';
      ctx.beginPath();ctx.ellipse(-s*.6,0,s*.5,s*.18,-0.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(s*.6,0,s*.5,s*.18,0.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#3a3a3a';
      ctx.beginPath();ctx.arc(0,0,s*.28,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#cc3322';
      ctx.beginPath();ctx.arc(0,-s*.35,s*.18,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.moveTo(0,-s*.22);ctx.lineTo(s*.18,-s*.32);ctx.lineTo(s*.05,-s*.42);ctx.closePath();ctx.fill();
      break;
    }
    case 'scorpion_enemy':{
      ctx.fillStyle='#2a1a00';
      ctx.fillRect(-s*.35,-s*.15,s*.7,s*.3);
      ctx.fillStyle='#3a2800';
      ctx.fillRect(-s*.45,-s*.18,s*.3,s*.22);
      ctx.strokeStyle='#3a2800';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(-s*.45,0);ctx.lineTo(-s*.7,s*.18);ctx.lineTo(-s*.62,s*.28);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-s*.45,0);ctx.lineTo(-s*.72,-s*.15);ctx.lineTo(-s*.65,-s*.28);ctx.stroke();
      ctx.fillStyle='#4a3800';
      ctx.fillRect(s*.35,-s*.08,s*.2,s*.15);
      ctx.fillRect(s*.55,-s*.12,s*.18,s*.15);
      ctx.fillRect(s*.7,-s*.18,s*.14,s*.14);
      ctx.fillStyle='#880000';
      ctx.beginPath();ctx.moveTo(s*.84,-s*.18);ctx.lineTo(s*.95,-s*.38);ctx.lineTo(s*.78,-s*.12);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ff4400';
      ctx.beginPath();ctx.arc(-s*.34,-s*.06,s*.06,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(-s*.22,-s*.06,s*.06,0,Math.PI*2);ctx.fill();
      break;
    }
    case 'mega_elephant':{
      ctx.scale(1.6,1.6);
      drawSprite(ctx,'elephant',0,0,size*.62);
      ctx.shadowColor='#ff4400';ctx.shadowBlur=30;
      ctx.fillStyle='rgba(255,100,0,.18)';
      ctx.beginPath();ctx.arc(0,0,s*.9,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      break;
    }
    case 'alpha_lion':{
      ctx.scale(1.4,1.4);
      drawSprite(ctx,'lion',0,0,size*.7);
      ctx.shadowColor='#ff6600';ctx.shadowBlur=25;
      ctx.strokeStyle='rgba(255,150,0,.5)';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(0,-s*.15*.7,s*.52*.7,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;

    case 'ancient_hippo':{
      ctx.scale(1.7,1.7);
      drawSprite(ctx,'hippo',0,0,size*.59);
      ctx.shadowColor='#9900ff';ctx.shadowBlur=28;
      ctx.fillStyle='rgba(150,0,255,.12)';
      ctx.beginPath();ctx.arc(0,0,s*.9,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      break;
    }
    case 'spear':{
      ctx.fillStyle=opts.crit?'#ff6600':'#c89020';
      ctx.fillRect(-s,-.12*s,s*2,.24*s);
      ctx.fillStyle=opts.crit?'#ffaa00':'#ffe090';
      ctx.beginPath();ctx.moveTo(s,0);ctx.lineTo(s*.4,-s*.25);ctx.lineTo(s*.4,s*.25);ctx.closePath();ctx.fill();
      if(opts.crit){ctx.shadowColor='#ff4400';ctx.shadowBlur=10;}
      break;
    }
    case 'scorpion_proj':{
      ctx.fillStyle='rgba(60,180,20,.8)';
      ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(100,255,60,.5)';
      ctx.beginPath();ctx.arc(-s*.3,-s*.3,s*.4,0,Math.PI*2);ctx.fill();
      break;
    }
    case 'boulder':{
      const rg=ctx.createRadialGradient(-s*.3,-s*.3,0,0,0,s);
      rg.addColorStop(0,'#c0a060');rg.addColorStop(.7,'#7a5820');rg.addColorStop(1,'#3a2808');
      ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fillStyle=rg;ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-s*.2,-s*.4);ctx.lineTo(s*.1,s*.2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(s*.3,-s*.2);ctx.lineTo(-s*.1,s*.35);ctx.stroke();
      break;
    }
    case 'lightning_proj':{
      ctx.strokeStyle='#FFD700';ctx.lineWidth=2.5;
      ctx.shadowColor='#FFD700';ctx.shadowBlur=8;
      ctx.beginPath();
      ctx.moveTo(-s,0);
      ctx.lineTo(-s*.3,-s*.5);ctx.lineTo(0,0);ctx.lineTo(s*.3,s*.5);ctx.lineTo(s,0);
      ctx.stroke();ctx.shadowBlur=0;
      break;
    }
    case 'torch_proj':{
      ctx.fillStyle='#cc3300';
      ctx.fillRect(-s*.15,-s*.2,s*.3,s*.9);
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.arc(0,-s*.45,s*.32,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff6600';
      ctx.beginPath();ctx.arc(s*.08,-s*.55,s*.18,0,Math.PI*2);ctx.fill();

    case 'uranium_proj':{
      ctx.fillStyle='rgba(50,220,50,.7)';
      ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(100,255,100,.4)';
      ctx.beginPath();ctx.arc(0,0,s*.6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.5)';
      for(let i=0;i<3;i++){
        ctx.save();ctx.rotate(i*Math.PI*2/3);

    case 'chest':{

      ctx.fillStyle='#9a6830';
      ctx.fillRect(-s*.7,-s*.55,s*1.4,s*.28);
      ctx.fillStyle='#c8a020';
      ctx.fillRect(-s*.7,-s*.32,s*1.4,s*.06);
      ctx.fillRect(-s*.08,-s*.55,s*.16,s*.8);
      ctx.fillStyle='#e8c040';
      ctx.fillRect(-s*.14,-s*.22,s*.28,s*.2);
      ctx.strokeStyle='#e8c040';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,-s*.22,s*.12,Math.PI,0);ctx.stroke();

    }
    case 'cactus':{
      ctx.fillStyle='#3a6a28';
      ctx.fillRect(-s*.12,-s*.8,s*.24,s*1.0);
      ctx.fillRect(-s*.5,-s*.2,s*.38,s*.16);
      ctx.fillRect(-s*.5,-s*.35,s*.16,s*.2);
      ctx.fillRect(s*.12,-s*.2,s*.38,s*.16);

    case 'rock':{
      ctx.fillStyle='#888070';

      ctx.beginPath();ctx.arc(-s*.13,-s*.08,s*.1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(s*.13,-s*.08,s*.1,0,Math.PI*2);ctx.fill();

      ctx.fillStyle='#000';

      ctx.fillRect(s*.08,s*.2,s*.1,s*.14);
      break;
    }
    case 'palm':{
      ctx.fillStyle='#8a6030';
      ctx.fillRect(-s*.1,-s*.5,s*.2,s*.9);
      ctx.fillStyle='#3a8830';

function buildDecos(){

// ── Camera ────────────────────────────────────────────────────────────────────
function camUpdate(){
  S.cam.x=Math.max(0,Math.min(WW-W,S.p.x-W/2));
  S.cam.y=Math.max(0,Math.min(WH-H,S.p.y-H/2));
}
function toS(wx,wy){return{x:wx-S.cam.x,y:wy-S.cam.y};}
function inV(wx,wy,m=100){const s=toS(wx,wy);return s.x>-m&&s.x<W+m&&s.y>-m&&s.y<H+m;}

// ── Render background ────────────────────────────────────────────────────────
function drawBackground(){
  const tileSize=100;
  const offX=S.cam.x%tileSize;
  const offY=S.cam.y%tileSize;
  const tilesX=Math.ceil(W/tileSize)+2;
  const tilesY=Math.ceil(H/tileSize)+2;
  for(let ty=0;ty<tilesY;ty++){
    for(let tx=0;tx<tilesX;tx++){
      const worldX=Math.floor(S.cam.x/tileSize)*tileSize+tx*tileSize;
      const worldY=Math.floor(S.cam.y/tileSize)*tileSize+ty*tileSize;
      const h=(worldX*1234+worldY*5678)%100;
      const brightness=h<10?'#c49040':h<25?'#cc9848':h<50?'#c49040':'#be8c3a';
      ctx.fillStyle=brightness;
      ctx.fillRect(tx*tileSize-offX%tileSize,ty*tileSize-offY%tileSize,tileSize,tileSize);
      if(h<15){
        ctx.fillStyle='rgba(160,100,20,.18)';
        ctx.beginPath();
        const dx=tx*tileSize-offX%tileSize+tileSize/2;
        const dy=ty*tileSize-offY%tileSize+tileSize/2;
        ctx.ellipse(dx,dy,30+h*2,8,h*.1,0,Math.PI*2);
        ctx.fill();
      }
    }
  }
  const bx=-S.cam.x,by=-S.cam.y;
  ctx.strokeStyle='#7a5010';ctx.lineWidth=8;
  ctx.strokeRect(bx,by,WW,WH);
  ctx.fillStyle='rgba(80,40,0,.3)';
  ctx.fillRect(bx,by,WW,8);ctx.fillRect(bx,by+WH-8,WW,8);
  ctx.fillRect(bx,by,8,WH);ctx.fillRect(bx+WW-8,by,8,WH);
}

function drawDecos(){
  for(const d of S.decos){
    if(!inV(d.x,d.y,80))continue;
    const s=toS(d.x,d.y);
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(d.rot);
    drawSprite(ctx,d.type,0,0,32*d.s);
    ctx.restore();
  }
}

function drawChests(){
  for(const ch of S.chests){
    if(ch.open)continue;
    if(!inV(ch.x,ch.y))continue;
    const s=toS(ch.x,ch.y);

function drawUraniumRing(){
  if(S.ups.uranium){
    const lvl=S.ups.uranium,rad=55+lvl*12;
    const ps=toS(S.p.x,S.p.y);
    ctx.save();
    ctx.strokeStyle=`rgba(50,220,50,${.2+lvl*.05})`;
    ctx.lineWidth=8+lvl*2;
    ctx.shadowColor='rgba(50,220,50,.4)';ctx.shadowBlur=12;
    ctx.setLineDash([12,8]);
    ctx.lineDashOffset=-(Date.now()*.05)%20;
    ctx.beginPath();ctx.arc(ps.x,ps.y,rad,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);ctx.shadowBlur=0;
    ctx.restore();
  }
  if(S.ups.sandstorm){
    const lvl=S.ups.sandstorm,rad=70+lvl*18;
    const ps=toS(S.p.x,S.p.y);
    const now=Date.now()/1000;
    ctx.save();
    const grad=ctx.createRadialGradient(ps.x,ps.y,rad*.3,ps.x,ps.y,rad);
    grad.addColorStop(0,`rgba(210,160,60,${.07+lvl*.025})`);
    grad.addColorStop(1,'rgba(210,160,60,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(ps.x,ps.y,rad,0,Math.PI*2);ctx.fill();
    const pc=8+lvl*4;
    for(let i=0;i<pc;i++){
      const angle=now*2.5+(i/pc)*Math.PI*2;
      const wobble=Math.sin(now*4+i*1.3)*rad*.12;
      const r=rad*.65+wobble+Math.sin(now*2.2+i*.7)*rad*.18;
      const px2=ps.x+Math.cos(angle)*r,py2=ps.y+Math.sin(angle)*r;
      const sz=1.5+lvl*.6+Math.sin(now*3+i);
      ctx.globalAlpha=.5+Math.sin(now*2+i)*.18;
      ctx.fillStyle=`hsl(${35+i*8},70%,${52+lvl*3}%)`;
      ctx.beginPath();ctx.arc(px2,py2,sz,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=.3+lvl*.06;
    ctx.strokeStyle='rgba(220,170,60,.7)';
    ctx.lineWidth=1.5;ctx.setLineDash([6,6]);
    ctx.lineDashOffset=-(now*38)%12;
    ctx.beginPath();ctx.arc(ps.x,ps.y,rad,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
    ctx.restore();
  }
}

function drawProjectiles(){
  for(const p of S.projs){

function drawEnemies(){
  for(const e of S.ens){
    if(!inV(e.x,e.y,80))continue;
    const s=toS(e.x,e.y);
    ctx.save();
    if(e.t.boss){ctx.shadowColor='rgba(255,100,0,.6)';ctx.shadowBlur=16+Math.sin(Date.now()*.005)*6;}
    if(e.raging){ctx.shadowColor='rgba(255,0,0,.7)';ctx.shadowBlur=20;}
    ctx.globalAlpha=.18;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(s.x,s.y+e.t.r-2,e.t.r*.65,5,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=e.flash>0?.4:1;
    ctx.shadowBlur=e.t.boss?(16+Math.sin(Date.now()*.005)*6):0;
    const flip=(e.x>S.p.x)?-1:1;
    ctx.translate(s.x,s.y);
    if(flip===-1){ctx.scale(-1,1);}
    if(e.flash>0){
      ctx.save();ctx.globalAlpha=.5;ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(0,0,e.t.r,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    drawSprite(ctx,e.t.sp,0,0,e.t.r*2);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    if(e.charging){
      ctx.fillStyle='rgba(255,80,0,.6)';
      ctx.beginPath();ctx.arc(0,0,e.t.r*1.3,0,Math.PI*2);ctx.fill();
    }
    ctx.setTransform(1,0,0,1,0,0);
    const bw=e.t.r*2.4,bh=e.t.boss?7:4;
    ctx.fillStyle='#2a1010';ctx.fillRect(s.x-bw/2,s.y-e.t.r-12,bw,bh);
    const hp=e.hp/e.t.hp;
    ctx.fillStyle=hp>.6?'#4caf50':hp>.3?'#ff9800':'#e53935';
    ctx.fillRect(s.x-bw/2,s.y-e.t.r-12,bw*hp,bh);
    if(e.t.boss){
      ctx.font='bold 10px Oswald,sans-serif';ctx.fillStyle='#ff6b35';
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(e.t.bname||'BAAS',s.x,s.y-e.t.r-14);
    }
    if(e.t.ability==='poison'){
      ctx.fillStyle='rgba(60,200,60,.5)';
      ctx.beginPath();ctx.arc(s.x,s.y-e.t.r+2,5,0,Math.PI*2);ctx.fill();
    }
    if(e._inStorm&&e._inStorm<1){
      ctx.fillStyle=`rgba(210,160,60,${(1-e._inStorm)*.45})`;
      ctx.beginPath();ctx.arc(s.x,s.y,e.t.r*1.15,0,Math.PI*2);ctx.fill();
    }
    if(e.flash>0)e.flash--;
    ctx.restore();
  }
}

function drawPlayer(){
  const p=S.p,s=toS(p.x,p.y);
  if(p.inv>0&&Math.floor(Date.now()/80)%2===0)return;
  ctx.save();ctx.translate(s.x,s.y);
  if(p.dashing>0){
    for(let i=1;i<=3;i++){
      ctx.save();ctx.globalAlpha=.15/i;
      drawSprite(ctx,'player',-p.ddx*i*10,-p.ddy*i*10,p.r*2);
      ctx.restore();
    }
  }
  ctx.globalAlpha=.18;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,p.r-2,p.r*.7,5,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  const hasUlt=Object.entries(S.ups).some(([id,lv])=>lv===8&&WEAPON_IDS.includes(id));
  if(hasUlt){
    const now2=Date.now()/1000;
    ctx.save();
    ctx.shadowColor='rgba(255,100,0,.8)';ctx.shadowBlur=28+Math.sin(now2*3)*10;
    ctx.strokeStyle=`rgba(255,${140+Math.sin(now2*5)*60},0,${.5+Math.sin(now2*4)*.3})`;
    ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,p.r*2.2+Math.sin(now2*6)*3,0,Math.PI*2);ctx.stroke();

function drawParticles(){
  // Limit particles drawn for performance
  const maxDraw = Math.min(S.parts.length, 60);
  for(let i=0;i<maxDraw;i++){
    const p=S.parts[i];
    if(!inV(p.x,p.y,40))continue;
    const s=toS(p.x,p.y);
    ctx.save();ctx.globalAlpha=p.life/p.maxL;
    if(p.isT){
      ctx.font=`bold ${p.sz}px Oswald,sans-serif`;

      ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(s.x,s.y,p.sz*.3,0,Math.PI*2);ctx.fill();

}

function render(){
  let sx=0,sy=0;
  if(shake>0){sx=(Math.random()-.5)*shake;sy=(Math.random()-.5)*shake;shake*=.78;if(shake<.3)shake=0;}
  ctx.save();ctx.translate(Math.round(sx),Math.round(sy));
  ctx.clearRect(-20,-20,W+40,H+40);

// ── Spawn ─────────────────────────────────────────────────────────────────────
function spawnEnemy(forceBoss){
  // Enforce enemy cap to reduce lag
  if(S.ens.length>=MAX_ENEMIES)return;

  let t;
  if(forceBoss){
    const bs=ET.filter(e=>e.boss);
    t=JSON.parse(JSON.stringify(bs[Math.min(Math.floor(S.wave/3),bs.length-1)]));
    sfxBoss();
    announce(`BAAS: ${t.bname||'BAAS'}!`,'PAS OP!');
  } else {
    const p2=pool(S.wave);
    // Reduce vulture weight: only 5% of spawns can be vultures
    let candidates=p2.filter(e=>e.id!=='vulture');
    if(Math.random()<0.05&&p2.find(e=>e.id==='vulture'))candidates.push(p2.find(e=>e.id==='vulture'));
    if(!candidates.length)candidates=p2;
    t=JSON.parse(JSON.stringify(candidates[Math.floor(Math.random()*candidates.length)]));
  }
  const px=S.p.x,py=S.p.y,side=Math.floor(Math.random()*4),sr=600;
  let x,y;
  if(side===0){x=px+(Math.random()-.5)*sr*2;y=py-sr;}
  else if(side===1){x=px+sr;y=py+(Math.random()-.5)*sr*2;}
  else if(side===2){x=px+(Math.random()-.5)*sr*2;y=py+sr;}
  else{x=px-sr;y=py+(Math.random()-.5)*sr*2;}
  x=Math.max(60,Math.min(WW-60,x));y=Math.max(60,Math.min(WH-60,y));
  // Slower difficulty scaling: was wave*.13 + time/350*.25, now wave*.08 + time/500*.18
  const scl=1+(S.wave-1)*.08+S.time/500*.18;
  const e={x,y,hp:t.hp*scl,t,flash:0,_ocd:0,
    abilityCur:0,sprinting:false,sprintT:0,charging:false,chargeT:0,chargeVx:0,chargeVy:0,raging:false};
  S.ens.push(e);
}

// ── Weapons ───────────────────────────────────────────────────────────────────
function fireWeapons(){
  const p=S.p,now=Date.now();

  // SPEAR
  if(S.ups.spear){
    const l=S.ups.spear;
    if(l===8){
      const cd=200;
      if(!S.lastShot.spear||now-S.lastShot.spear>cd){
        S.lastShot.spear=now;
        for(const e of S.ens.slice(0,20)){
          const a=Math.atan2(e.y-p.y,e.x-p.x);
          fire('spear',p.x,p.y,a,9,120,12,99,true);
        }
      }
    } else {
      const cd=Math.max(300,1250-l*185);
      if(!S.lastShot.spear||now-S.lastShot.spear>cd){
        S.lastShot.spear=now;const t=nearest();
        if(t){
          const a=Math.atan2(t.y-p.y,t.x-p.x),dmg=30+l*16,pi=l>=6?99:2;
          fire('spear',p.x,p.y,a,7.8,dmg,10,pi,false);
          if(l>=3){fire('spear',p.x,p.y,a+.24,7,dmg*.6,10,pi,false);}
          if(l>=3){fire('spear',p.x,p.y,a-.24,7,dmg*.6,10,pi,false);}
          if(l>=6){fire('spear',p.x,p.y,a+.48,6.5,dmg*.4,10,pi,false);fire('spear',p.x,p.y,a-.48,6.5,dmg*.4,10,pi,false);}
        }
      }
    }
  }

  // SCORPION
  if(S.ups.scorpion){
    const l=S.ups.scorpion;
    if(l===8){
      const cd=300;
      if(!S.lastShot.scorpion||now-S.lastShot.scorpion>cd){
        S.lastShot.scorpion=now;
        for(let i=0;i<32;i++)fire('scorpion',p.x,p.y,(i/32)*Math.PI*2,5.5,80,8,1,false);
      }
    } else {
      const cd=Math.max(440,2000-l*200);
      if(!S.lastShot.scorpion||now-S.lastShot.scorpion>cd){
        S.lastShot.scorpion=now;const cnt=4+l*2;
        for(let i=0;i<cnt;i++)fire('scorpion',p.x,p.y,(i/cnt)*Math.PI*2,4.6,20+l*10,7,1,false);
      }
    }
  }

  // BOULDER
  if(S.ups.boulder){
    const l=S.ups.boulder;
    if(l===8){
      const cd=800;
      if(!S.lastShot.boulder||now-S.lastShot.boulder>cd){
        S.lastShot.boulder=now;
        for(let i=0;i<3;i++){
          const ang=(i/3)*Math.PI*2;
          const t=nearest();
          const a=t?Math.atan2(t.y-p.y,t.x-p.x)+ang*.3:ang;
          fire('boulder',p.x,p.y,a,5,260,24,99,false);
        }
        sfxExplo();
      }
    } else {
      const cd=Math.max(550,2700-l*300);
      if(!S.lastShot.boulder||now-S.lastShot.boulder>cd){
        S.lastShot.boulder=now;const t=nearest();
        if(t){fire('boulder',p.x,p.y,Math.atan2(t.y-p.y,t.x-p.x),4.2,56+l*26,18,3+l,false);sfxExplo();}
      }
    }
  }

  // TORCH
  if(S.ups.torch){
    const l=S.ups.torch;
    if(l===8){
      const cd=400;
      if(!S.lastShot.torch||now-S.lastShot.torch>cd){
        S.lastShot.torch=now;
        for(let i=0;i<12;i++){
          const ang=(i/12)*Math.PI*2;
          fire('torch',p.x,p.y,ang,6.5,80,10,3,false);
        }
      }
    } else {
      const cd=Math.max(320,1400-l*160);
      if(!S.lastShot.torch||now-S.lastShot.torch>cd){
        S.lastShot.torch=now;const t=nearest();
        if(t){
          const a=Math.atan2(t.y-p.y,t.x-p.x);
          fire('torch',p.x,p.y,a,6,22+l*12,9,2,false);
          if(l>=3){fire('torch',p.x,p.y,a+.28,5.5,18+l*8,8,1,false);fire('torch',p.x,p.y,a-.28,5.5,18+l*8,8,1,false);}
          if(l>=6){fire('torch',p.x,p.y,a+.55,5,14+l*6,7,1,false);fire('torch',p.x,p.y,a-.55,5,14+l*6,7,1,false);}
        }
      }
    }
  }
}

// ── ATOOMBOM: elke 30 seconden ALLE vijanden ──────────────────────────────────
function tickBomb(dt){
  if(!S.ups.explosive)return;
  const l=S.ups.explosive;

  S.bombChargeT+=dt;

  if(S.bombChargeT>=30){
    S.bombChargeT=0;
    const dmg=l===8?999:(60+l*40);
    const rad=l===8?9999:(80+l*20);
    let hitCount=0;
    // Hit ALL enemies on screen
    for(const e of S.ens){
      if(e.hp>0){
        damageE(e,dmg);
        hitCount++;
        // Visual effect on each enemy
        fxP(e.x,e.y,'#ff6600',12,30);
      }
    }
    if(hitCount>0){
      sfxExplo();sfxExplo();
      shake=Math.min(shake+18,24);
      // Big screen flash
      S.parts.push({x:S.p.x,y:S.p.y,c:'💥 BLIKSEM!',col:'#ff4400',sz:28,life:55,maxL:55,vx:0,vy:-0.8,isT:true});
      announce('ATOOM BLIKSEM!',`${hitCount} VIJANDEN GERAAKT`);
    }
  }
}

// ── Lightning: passive random strikes ────────────────────────────────────────
function tickLightning(dt){
  if(!S.ups.lightning)return;
  const l=S.ups.lightning;
  S.lightningT+=dt;
  const interval=(l===8)?0.4:Math.max(0.4,3.0-l*0.32);
  if(S.lightningT>=interval&&S.ens.length>0){
    S.lightningT=0;
    const strikes=l===8?8:1;
    for(let s=0;s<strikes;s++){
      const t=S.ens[Math.floor(Math.random()*S.ens.length)];
      if(!t||t.hp<=0)continue;
      const chainLen=l===8?8:(1+l);
      let chain=[t],cur=t;
      for(let i=1;i<chainLen;i++){
        const nx=S.ens.filter(e=>!chain.includes(e)&&dist2(e,cur)<220).sort((a,b)=>dist2(a,cur)-dist2(b,cur))[0];
        if(!nx)break;chain.push(nx);cur=nx;
      }
      chain.forEach((e,i)=>setTimeout(()=>{
        if(e.hp>0){
          const dmg=l===8?300:(25+l*18)/(i*.4+1);
          damageE(e,dmg);
          fxP(e.x,e.y,'#FFD700',14,25);
          S.parts.push({x:e.x,y:e.y,c:'⚡',col:'#FFD700',sz:l===8?28:18,life:20,maxL:20,vx:0,vy:-.5,isT:true});
        }
      },i*55+(s*80)));
    }
    beep(l===8?220:320,.12,'sawtooth',.06);
  }
}

function fire(kind,x,y,ang,spd,dmg,r,pierce,crit){
  S.projs.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,dmg,r,kind,pierce,crit,life:160,hit:new Set()});
}
function explode(x,y,rad,dmg){for(const e of S.ens)if(dist2({x,y},e)<rad+e.t.r)damageE(e,dmg);}
function nearest(){let b=null,bd=Infinity;for(const e of S.ens){const d=dist2(e,S.p);if(d<bd){bd=d;b=e;}}return b;}

// ── Uranium ring damage + Sandstorm slow ─────────────────────────────────────
function tickUranium(){
  const now=Date.now();
  if(S.ups.uranium){
    const l=S.ups.uranium,rad=55+l*12;
    for(const e of S.ens){
      if(dist2(e,S.p)<rad+e.t.r){
        if(now-e._ocd>180){
          e._ocd=now;
          damageE(e,8+l*5);
          if(l===8)e._irradiated=true;
        }
      } else {
        if(l===8)e._irradiated=false;
      }
    }
  }
  if(S.ups.sandstorm){
    const l=S.ups.sandstorm,rad=70+l*18;
    const slowFactor=l===8?0.05:Math.max(0.2,1-(l*0.16));
    for(const e of S.ens){
      if(dist2(e,S.p)<rad+e.t.r){
        e._inStorm=slowFactor;
        e._stormT=now;
        if(l===8&&now-e._ocd>300){e._ocd=now;damageE(e,15);}
      } else if(e._stormT&&now-e._stormT>200){
        e._inStorm=1;
      }
    }
  }
}

// ── Damage & kills ─────────────────────────────────────────────────────────────
function damageE(e,dmg){
  if(e.hp<=0)return;
  if(e._irradiated)dmg*=3;
  if(e.t.ability==='armor'&&e.t.armor>0){
    const absorbed=Math.min(dmg,e.t.armor);dmg-=absorbed;e.t.armor-=absorbed;
    if(dmg<=0){dmgNum(e.x,e.y-e.t.r,'PANTSER','#aaaaff');return;}
  }
  if(e.t.ability==='dodge'&&Math.random()<(e.t.dodgeChance||0)){
    dmgNum(e.x,e.y-e.t.r,'ONTWEEK','#88ff88');return;
  }
  e.hp-=dmg;e.flash=7;sfxHit();
  dmgNum(e.x,e.y-e.t.r,Math.round(dmg),dmg>=80?'#ff3300':dmg>=35?'#ff9800':'#FFD700');
  if(!e.raging&&e.t.ability==='rage'&&e.hp/e.t.hp<.4){
    e.raging=true;fxP(e.x,e.y,'#ff0000',20,35);dmgNum(e.x,e.y-e.t.r-20,'RAGE!','#ff0000');
  }
  if(e.hp<=0)killE(e);
}
function killE(e){
  S.kills++;S.score+=Math.round(e.t.sc*S.mult);
  S.mult=Math.min(10,S.mult+.12);S.multT=4;
  sfxKill();shake=Math.min(shake+(e.t.boss?22:5),e.t.boss?26:10);
  // Fewer particles for performance
  fxP(e.x,e.y,'#D4A854',e.t.boss?22:12,e.t.boss?60:36);
  if(e.t.boss){fxP(e.x,e.y,'#ff6600',20,45);fxP(e.x,e.y,'#FFD700',16,50);}
  const drops=e.t.boss?8:Math.random()<.10?2:1;
  // XP scaling: later in game, fewer/smaller orbs to slow down leveling
  const xpMult=Math.max(0.4, 1 - (S.wave*0.04));
  for(let i=0;i<drops;i++)S.picks.push({x:e.x+(Math.random()-.5)*44,y:e.y+(Math.random()-.5)*44,kind:'xp',value:Math.round(e.t.xp*xpMult)});
  if(Math.random()<.05)S.picks.push({x:e.x,y:e.y,kind:'hp',value:25});
  if(S.ups.vampire){
    const healAmt=S.ups.vampire===8?30:S.ups.vampire*2;
    S.p.hp=Math.min(S.p.hp+healAmt,S.p.maxHp);
    if(e.t.boss&&S.ups.vampire===8)S.p.hp=S.p.maxHp;
  }
  // Vulture flock: only spawn 1 extra (was 2), and only if under cap
  if(e.t.ability==='flock'&&!e.t.boss&&S.ens.length<MAX_ENEMIES-5){
    const ang=Math.random()*Math.PI*2;
    const ne=JSON.parse(JSON.stringify(ET.find(t=>t.id==='vulture')));
    S.ens.push({x:e.x+Math.cos(ang)*40,y:e.y+Math.sin(ang)*40,hp:ne.hp,t:ne,flash:0,_ocd:0,abilityCur:0,sprinting:false,sprintT:0,charging:false,chargeT:0,raging:false});
  }
  S.ens=S.ens.filter(x=>x!==e);
  gainXP(e.t.xp);
}

// XP: scaling factor so later levels need significantly more XP
function gainXP(a){
  // Reduce XP gain in later waves/levels
  const lvlPenalty=Math.max(0.3, 1-(S.p.lv*0.04));
  const wavePenalty=Math.max(0.35, 1-(S.wave*0.04));
  const adjustedXP=Math.round(a*lvlPenalty*wavePenalty);
  S.p.xp+=adjustedXP;
  while(S.p.xp>=S.p.xpNext){
    S.p.xp-=S.p.xpNext;
    // XP needed grows faster per level
    S.p.xpNext=Math.floor(S.p.xpNext*1.38);
    S.p.lv++;S.lvlQ++;sfxLvl();
  }
}

// ── Chest rewards ─────────────────────────────────────────────────────────────
const CHEST_REWARDS=[
  ()=>{gainXP(80);dmgNum(S.p.x,S.p.y-30,'+80 XP','#FFD700');},
  ()=>{S.p.hp=Math.min(S.p.hp+50,S.p.maxHp);dmgNum(S.p.x,S.p.y-30,'+50 HP','#ff4444');},
  ()=>{S.p.maxHp+=30;S.p.hp=Math.min(S.p.hp+30,S.p.maxHp);dmgNum(S.p.x,S.p.y-30,'+30 MAX HP','#ff8888');},
  ()=>{S.p.speed*=1.12;dmgNum(S.p.x,S.p.y-30,'SNELLER!','#88ffff');},
  ()=>{gainXP(120);dmgNum(S.p.x,S.p.y-30,'+120 XP','#FFD700');},
  ()=>{S.score+=500;dmgNum(S.p.x,S.p.y-30,'+500 SCORE','#FFD700');},
  ()=>{
    const avail=UPS.filter(u=>(S.ups[u.id]||0)<u.max&&['spear','scorpion','boulder','torch','lightning'].includes(u.id));
    if(avail.length){const u=avail[Math.floor(Math.random()*avail.length)];S.ups[u.id]=(S.ups[u.id]||0)+1;if(u.apply)u.apply(S.ups[u.id]);dmgNum(S.p.x,S.p.y-30,u.name+' LV'+S.ups[u.id],'#88ff88');}
    else{gainXP(100);dmgNum(S.p.x,S.p.y-30,'+100 XP','#FFD700');}
  },
];

function checkChests(){
  for(const ch of S.chests){
    if(!ch.open&&dist2(ch,S.p)<S.p.r+22){
      ch.open=true;sfxChest();
      fxP(ch.x,ch.y,'#FFD700',20,50);
      const reward=CHEST_REWARDS[Math.floor(Math.random()*CHEST_REWARDS.length)];
      reward();
      const el=document.getElementById('chestMsg');
      el.classList.add('show');S.chestMsgT=1.8;
    }
  }
}

// ── Pickups ───────────────────────────────────────────────────────────────────
function tickPicks(){
  const p=S.p,mr=55+(S.ups.magnet||0)*65;
  S.picks=S.picks.filter(pk=>{
    const d=dist2(pk,p);
    if(d<mr){const dx=p.x-pk.x,dy=p.y-pk.y,l=Math.hypot(dx,dy)||1;const sp=Math.min(7,150/d*2);pk.x+=dx/l*sp;pk.y+=dy/l*sp;}
    if(d<p.r+12){
      if(pk.kind==='xp')gainXP(pk.value);
      else if(pk.kind==='hp')S.p.hp=Math.min(S.p.hp+pk.value,S.p.maxHp);
      return false;
    }
    return true;
  });
  // Limit pickup pool size for performance
  if(S.picks.length>200)S.picks=S.picks.slice(-200);
}

// ── Enemy separation (simplified for performance) ────────────────────────────
function separate(){
  // Only run separation every other frame
  if(S.frame%2!==0)return;
  const en=S.ens;
  for(let i=0;i<en.length;i++)for(let j=i+1;j<en.length;j++){
    const a=en[i],b=en[j],dx=b.x-a.x,dy=b.y-a.y,dd=Math.hypot(dx,dy)||1,md=a.t.r+b.t.r+3;
    if(dd<md){const push=(md-dd)*.18;a.x-=dx/dd*push;a.y-=dy/dd*push;b.x+=dx/dd*push;b.y+=dy/dd*push;}
  }
}

// ── Main update ───────────────────────────────────────────────────────────────
function update(ts){
  if(!S.running||S.paused)return;
  const dt=Math.min((ts-lastT)/1000,.055);lastT=ts;
  S.time+=dt;S.frame++;

  // Wave — slower scaling: every 50s instead of 40s
  if(S.time-S.lastWaveT>50){S.wave++;S.lastWaveT=S.time;announce(`WAVE ${S.wave}`,WAVE_SUBS[Math.min(S.wave-1,WAVE_SUBS.length-1)]);}
  if(S.wPopT>0){S.wPopT-=dt;if(S.wPopT<=0)document.getElementById('wPop').classList.remove('show');}
  if(S.chestMsgT>0){S.chestMsgT-=dt;if(S.chestMsgT<=0)document.getElementById('chestMsg').classList.remove('show');}

  // Boss — slightly less frequent
  if(S.time>=S.nextBoss){S.nextBoss+=100+S.wave*6;spawnEnemy(true);}

  // Spawn — reduced rates across all waves
  const sr=Math.max(.25,2.2-S.wave*.1-S.time/220);
  S.spawnT+=dt;
  while(S.spawnT>=sr){
    S.spawnT-=sr;
    if(S.ens.length<MAX_ENEMIES)spawnEnemy(false);
    if(S.wave>=2&&Math.random()<.35&&S.ens.length<MAX_ENEMIES)spawnEnemy(false);
    if(S.wave>=4&&Math.random()<.40&&S.ens.length<MAX_ENEMIES)spawnEnemy(false);
    if(S.wave>=7&&Math.random()<.40&&S.ens.length<MAX_ENEMIES)spawnEnemy(false);
    if(S.wave>=10&&Math.random()<.35&&S.ens.length<MAX_ENEMIES)spawnEnemy(false);
    if(S.wave>=14&&Math.random()<.30&&S.ens.length<MAX_ENEMIES)spawnEnemy(false);
  }

  // player move
  const p=S.p;let mx=0,my=0;
  if(S.keys['ArrowLeft']||S.keys['a']||S.keys['A'])mx-=1;
  if(S.keys['ArrowRight']||S.keys['d']||S.keys['D'])mx+=1;
  if(S.keys['ArrowUp']||S.keys['w']||S.keys['W'])my-=1;
  if(S.keys['ArrowDown']||S.keys['s']||S.keys['S'])my+=1;
  if(mx||my)p.facing=mx<0?-1:mx>0?1:p.facing;
  const ml=Math.hypot(mx,my)||1;
  const slowMult=slowT>0?.55:1;

  if(p.dashing>0){
    p.dashing-=dt;
    p.x=Math.max(p.r,Math.min(WW-p.r,p.x+p.ddx*p.speed*4.8));
    p.y=Math.max(p.r,Math.min(WH-p.r,p.y+p.ddy*p.speed*4.8));
    p.inv=Math.max(p.inv,p.dashing);
  } else if(mx||my){
    p.x=Math.max(p.r,Math.min(WW-p.r,p.x+(mx/ml)*p.speed*slowMult));
    p.y=Math.max(p.r,Math.min(WH-p.r,p.y+(my/ml)*p.speed*slowMult));
  }
  if(p.dashCd>0)p.dashCd-=dt;
  if(p.inv>0)p.inv-=dt;
  if(slowT>0)slowT-=dt;
  if(poisonT>0){poisonT-=dt;if(S.frame%60===0){p.hp-=3;if(p.hp<=0){gameOver();return;}}}
  if(S.multT>0)S.multT-=dt;else S.mult=Math.max(1,S.mult-.35*dt);

  fireWeapons();
  tickBomb(dt);

  // projectiles
  S.projs=S.projs.filter(pr=>{
    pr.x+=pr.vx;pr.y+=pr.vy;pr.life--;
    if(pr.x<-150||pr.x>WW+150||pr.y<-150||pr.y>WH+150||pr.life<=0)return false;
    for(const e of S.ens)if(!pr.hit.has(e)&&dist2(pr,e)<pr.r+e.t.r){
      pr.hit.add(e);damageE(e,pr.dmg);
      if(pr.kind==='torch'){e._onFire=60;dmgNum(e.x,e.y-e.t.r,'BRAND!','#ff6600');}
      pr.pierce--;if(pr.pierce<=0)return false;
    }
    return true;
  });
  // Cap projectiles for performance
  if(S.projs.length>150)S.projs=S.projs.slice(-150);

  // fire damage tick
  for(const e of S.ens)if(e._onFire>0){e._onFire--;if(e._onFire%12===0&&e.hp>0)damageE(e,4);}

  // enemies
  separate();
  for(const e of S.ens){
    const edx=p.x-e.x,edy=p.y-e.y,el=Math.hypot(edx,edy)||1;
    let spd=e.t.spd*(1+S.wave*.03+S.time/500);
    if(e.raging)spd*=2;
    if(e._inStorm&&e._inStorm<1)spd*=e._inStorm;

    e.abilityCur+=dt;
    if(e.t.ability==='sprint'&&!e.sprinting&&e.abilityCur>e.t.abilityCD){
      e.abilityCur=0;e.sprinting=true;e.sprintT=.6;
    }
    if(e.sprinting){e.sprintT-=dt;spd*=2.8;if(e.sprintT<=0)e.sprinting=false;}
    if(e.t.ability==='stomp'&&e.abilityCur>e.t.abilityCD){
      e.abilityCur=0;
      if(dist2(e,p)<180){explode(e.x,e.y,100,12);fxP(e.x,e.y,'#8B6914',12,22);shake=Math.min(shake+5,10);}
    }
    if(e.t.ability==='charge'&&!e.charging&&e.abilityCur>e.t.abilityCD&&dist2(e,p)<350){
      e.abilityCur=0;e.charging=true;e.chargeT=.8;
      const a=Math.atan2(edy,edx);e.chargeVx=Math.cos(a)*spd*4.2;e.chargeVy=Math.sin(a)*spd*4.2;
    }
    if(e.t.ability==='trample'&&e.abilityCur>e.t.abilityCD&&dist2(e,p)<200){
      e.abilityCur=0;slowT=2;dmgNum(p.x,p.y-30,'VERTRAAGD!','#8888ff');
    }
    if(e.t.ability==='poison'&&dist2(e,p)<e.t.r+p.r+5){
      if(poisonT<=0)dmgNum(p.x,p.y-30,'VERGIFTIGD!','#44ff44');
      poisonT=5;
    }

    if(e.charging){
      e.chargeT-=dt;
      e.x+=e.chargeVx;e.y+=e.chargeVy;
      if(e.chargeT<=0)e.charging=false;
    } else {
      e.x+=edx/el*spd;e.y+=edy/el*spd;
    }
    e.x=Math.max(40,Math.min(WW-40,e.x));e.y=Math.max(40,Math.min(WH-40,e.y));

    if(dist2(e,p)<e.t.r+p.r&&p.inv<=0){
      let dmg=e.t.dmg*(e.raging?2:1);
      p.hp-=dmg;shake=Math.min(shake+12,18);
      p.inv=.5+(S.ups.shield||0)*.5;
      if(p.hp<=0){gameOver();return;}
    }
  }

  tickUranium();tickPicks();checkChests();tickLightning(dt);

  S.regenT+=dt;
  if(S.regenT>=1){
    S.regenT=0;
    if(S.ups.regen)S.p.hp=Math.min(S.p.hp+S.ups.regen*.8,S.p.maxHp);
    if(S.ups.maxhp===8)S.p.hp=Math.min(S.p.hp+5,S.p.maxHp);
  }

  // Particle limit for performance
  S.parts=S.parts.filter(pt=>{pt.x+=pt.vx||0;pt.y+=(pt.vy||0)-.35;pt.life--;return pt.life>0;});
  if(S.parts.length>100)S.parts=S.parts.slice(-100);

  camUpdate();
  if(S.lvlQ>0){showLvlUp();return;}
  updateHUD();render();
  if(S.running)requestAnimationFrame(update);
}

const WAVE_SUBS=['DE HORDE NADERT','MEER BEESTEN KOMEN','ZE WORDEN GEVAARLIJKER','GEEN GENADE!','VLUCHT NIET!','ONVERMIJDELIJK...','EINDELOOS...','OVERLEVEN IS ALLES','CHAOS BREEKT LOS','DE WOESTIJN STRAFT'];

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD(){
  const p=S.p;
  document.getElementById('lvlV').textContent=`LV ${p.lv}`;
  document.getElementById('hpFill').style.width=(p.hp/p.maxHp*100)+'%';
  document.getElementById('xpFill').style.width=(p.xp/p.xpNext*100)+'%';
  document.getElementById('dashFill').style.width=(Math.max(0,1-p.dashCd/p.dashMax)*100)+'%';
  document.getElementById('killV').textContent=S.kills;
  document.getElementById('scoreV').textContent=Math.round(S.score).toLocaleString();
  document.getElementById('waveAnn').textContent=`WAVE ${S.wave}`+(S.mult>1.05?` x${S.mult.toFixed(1)}`:'');
  const m=Math.floor(S.time/60),s=Math.floor(S.time%60);
  document.getElementById('timerV').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const ac2=document.getElementById('auP');ac2.innerHTML='';
  for(const[id,lv]of Object.entries(S.ups)){
    const u=UPS.find(x=>x.id===id);if(!u)continue;
    const c=document.createElement('div');c.className='auc';

    c.style.borderColor=isUlt?'#ff6600':'';
    c.style.color=isUlt?'#ff9944':'';
    c.style.background=isUlt?'rgba(40,12,0,.95)':'';
    c.textContent=`${u.name} ${isUlt?'★':lv}`;
    ac2.appendChild(c);
  }
}

// ── Level up ──────────────────────────────────────────────────────────────────
function showLvlUp(){
  S.paused=true;document.getElementById('luO').classList.add('on');

  const weaponCount=WEAPON_IDS.filter(id=>S.ups[id]>0).length;
  const supportCount=SUPPORT_IDS.filter(id=>S.ups[id]>0).length;

  let candidates=UPS.filter(u=>{
    const cur=S.ups[u.id]||0;
    if(cur>=u.max)return false;
    if(u.type==='weapon'){
      if(cur>0)return true;
      return weaponCount<MAX_WEAPONS;
    } else {
      if(cur>0)return true;
      return supportCount<MAX_SUPPORT;
    }
  });

  // More balanced: don't heavily favor owned weapons.
  // Mix owned and new more evenly.
  const owned=candidates.filter(u=>(S.ups[u.id]||0)>0);
  const newOnes=candidates.filter(u=>(S.ups[u.id]||0)===0);
  owned.sort(()=>Math.random()-.5);
  newOnes.sort(()=>Math.random()-.5);

  let picks=[];
  // 50/50 chance: give 1 owned + 2 new, OR 2 owned + 1 new
  if(Math.random()<0.5){
    picks=picks.concat(owned.slice(0,1));
    picks=picks.concat(newOnes.slice(0,2));
  } else {
    picks=picks.concat(owned.slice(0,2));
    picks=picks.concat(newOnes.slice(0,1));
  }
  // Fill up to 3 if needed
  if(picks.length<3){
    const rest=candidates.filter(u=>!picks.includes(u));
    rest.sort(()=>Math.random()-.5);
    picks=picks.concat(rest.slice(0,3-picks.length));
  }
  picks=picks.slice(0,3);
  if(picks.length===0)picks=candidates.slice(0,3);

  const con=document.getElementById('ucards');con.innerHTML='';
  for(const u of picks){
    const cl=S.ups[u.id]||0;
    const nextLv=cl+1;
    const isUlt=nextLv===8;
    const isNew=cl===0;
    const card=document.createElement('div');
    card.className='uc'+(isUlt?' uc-ult':'');
    if(isUlt){
      card.style.borderColor='#ff6600';
      card.style.background='linear-gradient(155deg,#2a0e00,#1a0800)';
      card.style.boxShadow='0 0 18px rgba(255,100,0,.35)';
    }
    if(isNew){
      card.style.borderColor='#44aaff';
    }
    const desc=(u.desc||'').replace(/\n/g,'<br>');
    const lvLabel=isUlt?'<span style="color:#ff6600;font-size:13px;letter-spacing:2px;font-weight:700">★ ULTIEM LV8</span>':isNew?'<span class="ulv" style="color:#44aaff">NIEUW</span>':'<span class="ulv">LV '+cl+' → '+nextLv+'</span>';
    const typeTag=u.type==='weapon'?'<span style="font-size:9px;color:#888;letter-spacing:1px">WAPEN</span>':'<span style="font-size:9px;color:#6af;letter-spacing:1px">SUPPORT</span>';
    card.innerHTML=`${lvLabel}<div style="margin:4px 0 2px">${typeTag}</div><div class="un" style="${isUlt?'color:#ff6600':isNew?'color:#44aaff':''}">${u.name}</div><div class="ud">${desc}</div>`;
    card.onclick=()=>pickUp(u.id);
    con.appendChild(card);
  }

  document.getElementById('luS').textContent=`WAPENS ${weaponCount}/${MAX_WEAPONS}  ·  SUPPORT ${supportCount}/${MAX_SUPPORT}`;
}

function pickUp(id){
  const u=UPS.find(x=>x.id===id);
  const nl=(S.ups[id]||0)+1;
  S.ups[id]=nl;
  if(u.apply)u.apply(nl);
  if(nl===8){
    sfxLvl();sfxLvl();
    shake=20;
    announce(`★ ULTIEM: ${u.name}!`,'MAXIMAAL LEVEL BEREIKT');
  }
  S.lvlQ--;
  document.getElementById('luO').classList.remove('on');
  S.paused=false;
  if(S.lvlQ>0)showLvlUp();
  else{lastT=performance.now();requestAnimationFrame(update);}
}

// ── Game over ─────────────────────────────────────────────────────────────────

  S.running=false;

  document.getElementById('finalStats').innerHTML=
    `Overleefd: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}<br>
     Score: ${Math.round(S.score).toLocaleString()}<br>
     Gedode vijanden: ${S.kills}<br>
     Level bereikt: ${S.p.lv}<br>
     Wave: ${S.wave}`;
  document.getElementById('goS').style.display='flex';
}

// ── Particles ─────────────────────────────────────────────────────────────────
function fxP(x,y,col,sz,life){S.parts.push({x,y,col,sz,life,maxL:life,vx:(Math.random()-.5)*2.5,vy:-Math.random()*2-.5,isT:false});}
function dmgNum(x,y,n,col){S.parts.push({x,y,c:n,col,sz:12,life:38,maxL:38,vx:(Math.random()-.5)*.6,vy:-1.6,isT:true});}

// ── Utils ─────────────────────────────────────────────────────────────────────
function dist2(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

// ── Start ─────────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('startS').style.display='none';
  document.getElementById('goS').style.display='none';
  document.getElementById('luO').classList.remove('on');
  document.getElementById('wPop').classList.remove('show');
  document.getElementById('chestMsg').classList.remove('show');
  document.getElementById('bombTimer').classList.remove('active');
  poisonT=0;slowT=0;shake=0;
  reset();S.running=true;
  buildDecos();camUpdate();updateHUD();
  // Show weapon choice first, no starting weapon
  lastT=performance.now();
  showWeaponChoice();
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  S.keys[e.key]=true;
  if((e.key===' '||e.key==='Shift')&&S.running&&!S.paused){
    e.preventDefault();const p=S.p;
    if(p.dashCd<=0&&p.dashing<=0){
      let dx=0,dy=0;
      if(S.keys['ArrowLeft']||S.keys['a']||S.keys['A'])dx-=1;
      if(S.keys['ArrowRight']||S.keys['d']||S.keys['D'])dx+=1;
      if(S.keys['ArrowUp']||S.keys['w']||S.keys['W'])dy-=1;
      if(S.keys['ArrowDown']||S.keys['s']||S.keys['S'])dy+=1;
      const dl=Math.hypot(dx,dy)||1;
      p.ddx=dx/dl||(p.facing);p.ddy=dy/dl||0;
      p.dashing=.18;p.dashCd=p.dashMax;sfxDash();
    }
  }
});
document.addEventListener('keyup',e=>{if(S.keys)S.keys[e.key]=false;});

let touchO=null;
canvas.addEventListener('touchstart',e=>{touchO={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!touchO)return;const dx=e.touches[0].clientX-touchO.x,dy=e.touches[0].clientY-touchO.y;
  S.keys['a']=dx<-16;S.keys['d']=dx>16;S.keys['w']=dy<-16;S.keys['s']=dy>16;e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>{touchO=null;['a','d','w','s'].forEach(k=>{if(S.keys)S.keys[k]=false;});});
</script>
